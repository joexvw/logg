<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGG</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LOGG">
    <meta name="theme-color" content="#0b1210">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0b1210;
            --bg-mid: #0f1a16;
            --glass-bg: rgba(18, 32, 26, 0.6);
            --glass-border: rgba(74, 120, 90, 0.2);
            --glass-border-hover: rgba(74, 120, 90, 0.4);
            --glass-highlight: rgba(74, 120, 90, 0.08);
            --accent-green: #4a9e6b;
            --accent-green-light: #5ec47f;
            --accent-moss: #3d7a54;
            --accent-earth: #8b7355;
            --accent-sand: #c4a97d;
            --text-primary: #e8ebe9;
            --text-secondary: #8a9b90;
            --text-muted: #4d5f53;
            --text-dim: #364a3e;
            --danger: #c0544f;
            --radius: 16px;
            --radius-sm: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(45, 90, 60, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(60, 80, 50, 0.1) 0%, transparent 50%);
        }

        .container { max-width: 760px; margin: 0 auto; padding: 32px 20px; }

        /* Glass card mixin */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(74, 120, 90, 0.12);
        }
        .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--text-primary);
            text-transform: uppercase;
        }
        .logo span {
            background: linear-gradient(135deg, var(--accent-green-light), var(--accent-moss));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .date-display {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
        }

        /* Navigation */
        nav {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
        }
        nav button {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        nav button:hover {
            border-color: var(--glass-border-hover);
            color: var(--text-primary);
            background: rgba(18, 32, 26, 0.8);
        }
        nav button.active {
            background: linear-gradient(135deg, rgba(74, 158, 107, 0.15), rgba(61, 122, 84, 0.1));
            border-color: var(--accent-moss);
            color: var(--accent-green-light);
            box-shadow: 0 0 20px rgba(74, 158, 107, 0.08);
        }

        .view { display: none; }
        .view.active { display: block; }

        /* Sections */
        .section {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }
        .section:hover {
            border-color: var(--glass-border-hover);
        }
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-green);
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Hours rows */
        .hours-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 16px;
            align-items: start;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(74, 120, 90, 0.08);
        }
        .hours-row:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .hours-meta { display: flex; flex-direction: column; gap: 6px; }
        .hours-label {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }
        .hours-target {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .hours-inputs { display: flex; flex-direction: column; gap: 8px; }

        input[type="number"],
        input[type="text"],
        textarea {
            width: 100%;
            background: rgba(11, 18, 16, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-moss);
            box-shadow: 0 0 16px rgba(74, 158, 107, 0.1);
        }
        input::placeholder, textarea::placeholder {
            color: var(--text-dim);
        }
        input[type="number"] { width: 80px; }
        textarea { min-height: 90px; resize: vertical; }

        /* Toggle switches */
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(74, 120, 90, 0.06);
        }
        .toggle-row:last-child { border-bottom: none; }
        .toggle-row label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .toggle {
            width: 48px;
            height: 26px;
            background: rgba(11, 18, 16, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .toggle.on {
            background: linear-gradient(135deg, var(--accent-moss), var(--accent-green));
            border-color: var(--accent-green);
            box-shadow: 0 0 12px rgba(74, 158, 107, 0.2);
        }
        .toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--text-muted);
            border-radius: 50%;
            top: 2px;
            left: 3px;
            transition: all 0.3s ease;
        }
        .toggle.on::after {
            left: 24px;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        /* Save button */
        .btn-save {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(74, 158, 107, 0.2), rgba(61, 122, 84, 0.15));
            border: 1px solid var(--accent-moss);
            color: var(--accent-green-light);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border-radius: var(--radius);
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .btn-save:hover {
            background: linear-gradient(135deg, rgba(74, 158, 107, 0.3), rgba(61, 122, 84, 0.25));
            box-shadow: 0 0 24px rgba(74, 158, 107, 0.15);
            transform: translateY(-1px);
        }

        /* Dashboard */
        .countdown {
            text-align: center;
            padding: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        .countdown strong {
            color: var(--accent-green-light);
            font-size: 18px;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: var(--glass-border-hover);
            box-shadow: 0 4px 20px rgba(74, 158, 107, 0.06);
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }
        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
            font-weight: 500;
        }

        /* Entry cards */
        .entry-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            transition: border-color 0.3s ease;
        }
        .entry-card:hover { border-color: var(--glass-border-hover); }

        .entry-date {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .entry-hours {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .entry-bucket {
            text-align: center;
            padding: 12px 8px;
            border-radius: var(--radius-sm);
        }
        .bucket-promoting {
            background: linear-gradient(135deg, rgba(139, 115, 85, 0.15), rgba(139, 115, 85, 0.05));
            border: 1px solid rgba(139, 115, 85, 0.2);
        }
        .bucket-delivering {
            background: linear-gradient(135deg, rgba(74, 120, 140, 0.15), rgba(74, 120, 140, 0.05));
            border: 1px solid rgba(74, 120, 140, 0.2);
        }
        .bucket-producing {
            background: linear-gradient(135deg, rgba(74, 158, 107, 0.15), rgba(74, 158, 107, 0.05));
            border: 1px solid rgba(74, 158, 107, 0.2);
        }
        .entry-bucket .bucket-hrs {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }
        .entry-bucket .bucket-name {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
            font-weight: 500;
        }

        .entry-toggles {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .entry-toggles span.yes { color: var(--accent-green); }
        .entry-toggles span.no { color: var(--text-dim); }

        .entry-activities {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(74, 120, 90, 0.08);
            line-height: 1.6;
        }
        .entry-notes {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(74, 120, 90, 0.08);
            line-height: 1.6;
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        .empty-state p { font-size: 14px; margin-top: 8px; }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 11px;
            float: right;
            font-family: inherit;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .btn-delete:hover { color: var(--danger); }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(18, 32, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--accent-moss);
            color: var(--accent-green-light);
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            letter-spacing: 1px;
            transition: transform 0.3s ease;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><span>LOGG</span></div>
            <div class="date-display" id="todayDate"></div>
        </header>

        <nav>
            <button class="active" onclick="switchView('entry')">Log Entry</button>
            <button onclick="switchView('dashboard')">Dashboard</button>
        </nav>

        <!-- LOG ENTRY VIEW -->
        <div class="view active" id="view-entry">
            <div class="section">
                <div class="section-title">4-4-4 Split</div>
                <div class="hours-row">
                    <div class="hours-meta">
                        <div class="hours-label">Promoting</div>
                        <div class="hours-target">Target: 4hrs</div>
                        <input type="number" id="hrs-promoting" min="0" max="12" step="0.5" value="0">
                    </div>
                    <div class="hours-inputs">
                        <input type="text" id="act-promoting" placeholder="What did you put out there?">
                    </div>
                </div>
                <div class="hours-row">
                    <div class="hours-meta">
                        <div class="hours-label">Delivering</div>
                        <div class="hours-target">Target: 4hrs</div>
                        <input type="number" id="hrs-delivering" min="0" max="12" step="0.5" value="0">
                    </div>
                    <div class="hours-inputs">
                        <input type="text" id="act-delivering" placeholder="What did you ship or complete?">
                    </div>
                </div>
                <div class="hours-row">
                    <div class="hours-meta">
                        <div class="hours-label">Producing</div>
                        <div class="hours-target">Target: 4hrs</div>
                        <input type="number" id="hrs-producing" min="0" max="12" step="0.5" value="0">
                    </div>
                    <div class="hours-inputs">
                        <input type="text" id="act-producing" placeholder="What did you build or learn?">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Habits</div>
                <div class="toggle-row">
                    <label>Trained today?</label>
                    <div class="toggle" id="toggle-trained" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="toggle-row">
                    <label>Present for Jess?</label>
                    <div class="toggle" id="toggle-jess" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="toggle-row">
                    <label>Used LOGG today?</label>
                    <div class="toggle" id="toggle-logg" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="toggle-row">
                    <label>Smoked?</label>
                    <div class="toggle" id="toggle-smoked" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="toggle-row">
                    <label>Drank?</label>
                    <div class="toggle" id="toggle-drank" onclick="toggleSwitch(this)"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Notes</div>
                <div class="field">
                    <textarea id="notes" placeholder="Anything to capture about today..."></textarea>
                </div>
            </div>

            <button class="btn-save" onclick="saveEntry()">Save Entry</button>
        </div>

        <!-- DASHBOARD VIEW -->
        <div class="view" id="view-dashboard">
            <div class="countdown" id="countdown"></div>
            <div class="stats-grid" id="statsGrid"></div>
            <div id="entriesList"></div>
        </div>
    </div>

    <div class="toast" id="toast">Entry saved</div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const today = new Date();
        const h1End = new Date('2026-06-30');
        const daysLeft = Math.ceil((h1End - today) / (1000 * 60 * 60 * 24));

        document.getElementById('todayDate').textContent = today.toLocaleDateString('en-GB', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        });

        function getEntries() {
            return JSON.parse(localStorage.getItem('logg-entries') || '[]');
        }
        function setEntries(entries) {
            localStorage.setItem('logg-entries', JSON.stringify(entries));
        }

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            event.target.classList.add('active');
            if (view === 'dashboard') renderDashboard();
        }

        function toggleSwitch(el) {
            el.classList.toggle('on');
        }

        function saveEntry() {
            const entry = {
                date: today.toISOString().split('T')[0],
                timestamp: Date.now(),
                promoting: { hours: parseFloat(document.getElementById('hrs-promoting').value) || 0, activities: document.getElementById('act-promoting').value },
                delivering: { hours: parseFloat(document.getElementById('hrs-delivering').value) || 0, activities: document.getElementById('act-delivering').value },
                producing: { hours: parseFloat(document.getElementById('hrs-producing').value) || 0, activities: document.getElementById('act-producing').value },
                trained: document.getElementById('toggle-trained').classList.contains('on'),
                jess: document.getElementById('toggle-jess').classList.contains('on'),
                usedLogg: document.getElementById('toggle-logg').classList.contains('on'),
                smoked: document.getElementById('toggle-smoked').classList.contains('on'),
                drank: document.getElementById('toggle-drank').classList.contains('on'),
                notes: document.getElementById('notes').value
            };

            const entries = getEntries();
            const idx = entries.findIndex(e => e.date === entry.date);
            if (idx >= 0) entries[idx] = entry;
            else entries.unshift(entry);

            setEntries(entries);
            showToast('Entry saved');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function renderDashboard() {
            const entries = getEntries();

            document.getElementById('countdown').innerHTML =
                `<strong>${daysLeft}</strong> days until end of H1`;

            if (entries.length === 0) {
                document.getElementById('statsGrid').innerHTML = '';
                document.getElementById('entriesList').innerHTML =
                    '<div class="empty-state"><p>No entries yet. Go log your first day.</p></div>';
                return;
            }

            const totalDays = entries.length;
            const totalHours = entries.reduce((sum, e) => sum + e.promoting.hours + e.delivering.hours + e.producing.hours, 0);
            const fullDays = entries.filter(e => e.promoting.hours + e.delivering.hours + e.producing.hours >= 10).length;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalDays}</div>
                    <div class="stat-label">Days Logged</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalHours}</div>
                    <div class="stat-label">Total Hours</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${fullDays}</div>
                    <div class="stat-label">10+ Hr Days</div>
                </div>
            `;

            document.getElementById('entriesList').innerHTML = entries.map(e => `
                <div class="entry-card">
                    <button class="btn-delete" onclick="deleteEntry('${e.date}')">delete</button>
                    <div class="entry-date">${new Date(e.date + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}</div>
                    <div class="entry-hours">
                        <div class="entry-bucket bucket-promoting">
                            <div class="bucket-hrs">${e.promoting.hours}</div>
                            <div class="bucket-name">Promoting</div>
                        </div>
                        <div class="entry-bucket bucket-delivering">
                            <div class="bucket-hrs">${e.delivering.hours}</div>
                            <div class="bucket-name">Delivering</div>
                        </div>
                        <div class="entry-bucket bucket-producing">
                            <div class="bucket-hrs">${e.producing.hours}</div>
                            <div class="bucket-name">Producing</div>
                        </div>
                    </div>
                    <div class="entry-toggles">
                        <span class="${e.trained ? 'yes' : 'no'}">Trained: ${e.trained ? 'Y' : 'N'}</span>
                        <span class="${e.jess ? 'yes' : 'no'}">Jess: ${e.jess ? 'Y' : 'N'}</span>
                        <span class="${e.usedLogg ? 'yes' : 'no'}">LOGG: ${e.usedLogg ? 'Y' : 'N'}</span>
                        <span class="${!e.smoked ? 'yes' : 'no'}">Smoke-free: ${e.smoked ? 'N' : 'Y'}</span>
                        <span class="${!e.drank ? 'yes' : 'no'}">Sober: ${e.drank ? 'N' : 'Y'}</span>
                    </div>
                    ${e.promoting.activities || e.delivering.activities || e.producing.activities ? `
                    <div class="entry-activities">
                        ${e.promoting.activities ? '<div>P: ' + e.promoting.activities + '</div>' : ''}
                        ${e.delivering.activities ? '<div>D: ' + e.delivering.activities + '</div>' : ''}
                        ${e.producing.activities ? '<div>B: ' + e.producing.activities + '</div>' : ''}
                    </div>` : ''}
                    ${e.notes ? '<div class="entry-notes">' + e.notes + '</div>' : ''}
                </div>
            `).join('');
        }

        function deleteEntry(date) {
            if (!confirm('Delete this entry?')) return;
            const entries = getEntries().filter(e => e.date !== date);
            setEntries(entries);
            renderDashboard();
        }
    </script>
</body>
</html>
